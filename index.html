<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multas</title>
    <style>
        body{
            background-color: beige;
            font-family: Arial, Helvetica, sans-serif;
            padding-left: 8px;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Multas de Trânsito</h1>
    <p>
        É importante ficar atento ao limite de velocidade estabelecido nas vias,
       especialmente quando o limite é de 60 km/h. Exceder essa velocidade pode resultar em multas severas.
    </p>
    <p>
        velocidade do carro : <input type="number" name="txtvel" id="txtvel"> km/h   
        <input type="button" value="verficar" onclick="calcular()">  
    </p>
    
    <div id="res"></div>
    <script>
         function calcular(){
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value)   

            res.innerHTML = `<p>Sua velocidade é de ${vel} km/h</p>`
            if (vel > 60){
                res.innerHTML += 'Multado'
            }
            else{
                res.innerHTML += 'continue assim'
            }
            res.innerHTML += `<p>Dirija com cinto de segurança!</p>`
        }
      </script>

</body>
</html>
